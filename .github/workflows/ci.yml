# CI で `just check` を実行する(ローカルと CI の同一性が原則)。
# 補助ツールは mise.toml 由来(just / jq / swiftlint / swiftformat)。
# Swift コンパイラと Xcode は macos-26 ランナーイメージ由来。
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    # macOS 26 (Tahoe), Apple Silicon。GitHub ホスト型ランナーで 2026-02-26 に GA。
    # デプロイターゲット(ADR-0001)に一致させる。Speech/Core Audio API に必要。
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      # 注意: セットアップ後、各 action は commit SHA へピン留めを推奨(サプライ
      # チェーン対策)。dependabot.yml が github-actions を対象にするため、ピン留め
      # 後も自動更新される。
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version
      - run: just check

  # 設計上の注意:
  # - App ターゲットのビルドジョブは Slice 0(Xcode プロジェクト作成)後に追加する。
  # - 音声/TCC 統合テストはホスト型ランナーで実行不可(権限を付与できない)。
  #   ローカル限定。docs/domain-pitfalls.md #8 を参照。
  # - リリース署名・notarization は Slice 4 で別 workflow として追加する。
