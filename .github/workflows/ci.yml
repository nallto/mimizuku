# CI で `just check` を実行する(ローカルと CI の同一性が原則)。
# 補助ツールは mise.toml 由来(just / jq / swiftlint / swiftformat)。
# Swift コンパイラと Xcode は macos-26 ランナーイメージ由来。
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    # macOS 26 (Tahoe), Apple Silicon。GitHub ホスト型ランナーで 2026-02-26 に GA。
    # デプロイターゲット(ADR-0001)に一致させる。Speech/Core Audio API に必要。
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      # サプライチェーン対策として各 action を commit SHA へピン留めする(方針: G-0005)。
      # 版は末尾コメントで示す。dependabot.yml が github-actions を対象にするため、
      # ピン留め後も SHA とコメントが自動更新される。
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version
      - run: just check

  # App(.app)のコンパイル検証。SwiftUI MenuBarExtra は `swift build` では .app 化
  # できず xcodebuild が必須(ADR-0004)。純ロジック検証の check とは別ジョブにする。
  app-build:
    name: app-build
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version
      # WebRTC audio_processing(AEC3)のベンダリング(ADR-0013)。ビルドは数分かかる
      # ため、スクリプト(ピン留めコミットを含む)のハッシュをキーにキャッシュする。
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: Vendor/webrtc-apm
          key: webrtc-apm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build-webrtc-apm.sh') }}
      - name: Vendor WebRTC APM
        run: just vendor-apm
      # project.yml(正典)から .xcodeproj / Info.plist を生成する(ローカルと同一手順)。
      - name: Generate Xcode project
        run: just generate
      # ホスト型ランナーに署名証明書は無く、目的はコンパイル検証のみなので署名を無効化。
      # 署名済みビルドでしか TCC は動かないが(domain-pitfalls #4)、ここでは実行しない。
      # 署名 + notarization はリリーススライス(Slice 4)で別 workflow として追加する。
      - name: Build app (unsigned)
        run: |
          xcodebuild build \
            -project Mimizuku.xcodeproj \
            -scheme Mimizuku \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
      # AEC オフライン検証 CLI(#61)のコンパイル検証。実行(実音声)はローカル限定。
      - name: Build aecprobe (unsigned)
        run: |
          xcodebuild build \
            -project Mimizuku.xcodeproj \
            -scheme aecprobe \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

  # 設計上の注意:
  # - 音声/TCC 統合テストはホスト型ランナーで実行不可(権限を付与できない)。
  #   ローカル限定。docs/domain-pitfalls.md #8 を参照。
  # - リリース署名・notarization は Slice 4 で別 workflow として追加する。
