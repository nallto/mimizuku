# リリース制御弁(G-0002): main へのマージを集約したリリース PR を生成し、そのリリース
# PR をマージしたときのみタグ・Release・CHANGELOG 更新が発生する。
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # 設定は manifest モード: release-please-config.json / .release-please-manifest.json。
      # release-type=simple(version.txt + CHANGELOG.md を管理)。pre-1.0 の versioning 方針
      # (bump-minor-pre-major / bump-patch-for-minor-pre-major)は config ファイルで指定し、
      # 1.0.0 は Release-As で明示的に切るまで 0.x に留める(#7)。
      # macOS の署名・notarize・staple + Homebrew cask は Slice 4 で別 workflow。
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
